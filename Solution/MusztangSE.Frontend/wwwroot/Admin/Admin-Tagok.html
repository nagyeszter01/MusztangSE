<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Admin/AdminStyle.css">
    <link rel="icon" href="/img/favicon_48.png">
    <title>Admin – Felhasználók</title>
</head>
<body>
<header>
    <div class="logo">
        <a href="/Admin/MainPageAdmin.html">
            <img src="/img/logo.jpg" alt="Musztáng SE">
        </a>
    </div>
    <nav class="nav-center">
        <a href="/Admin/MainPageAdmin.html">Dashboard</a>
        <a href="/Admin/Admin-Tagok.html" class="active">Felhasználók</a>
        <a href="/Admin/Admin-Edzo.html">Edzők</a>
        <a href="/Admin/Admin-Csapatok.html">Csapatok</a>
        <a href="/Admin/Admin-Versenyek.html">Versenyek</a>
    </nav>
    <div class="kijelentkezes">
        <button id="kijelentkezes-gomb">Kijelentkezés</button>
    </div>
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="mobil-menu" id="mobil-menu">
        <a href="/Admin/MainPageAdmin.html">Dashboard</a>
        <a href="/Admin/Admin-Tagok.html">Felhasználók</a>
        <a href="/Admin/Admin-Edzo.html">Edzők</a>
        <a href="/Admin/Admin-Csapatok.html">Csapatok</a>
        <a href="/Admin/Admin-Versenyek.html">Versenyek</a>
        <button onclick="localStorage.clear(); window.location.href='/Bejelentkezes/bejelentkezes.html'">Kijelentkezés</button>
    </div>
</header>

<section class="content-section">
    <div class="lista-fejlec">
        <h2 class="section-title" style="margin:0">Felhasználók</h2>
    
    </div>

    <div id="fo-uzenet" class="uzenet"></div>

    <!-- SZŰRŐK -->
    <div class="admin-filters">
        <input type="text" id="kereses-input" class="admin-search" placeholder="Keresés név vagy azonosító alapján...">
        <select id="szerepkor-filter" class="admin-select">
            <option value="">Összes szerepkör</option>
            <option value="admin">Admin</option>
            <option value="edzo">Edző</option>
            <option value="tag">Tag</option>
        </select>
    </div>
    

    <!-- FELHASZNÁLÓK LISTA -->
    <div class="admin-table-wrapper">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Név</th>
                <th>Azonosító</th>
                <th>Szerepkör</th>
                <th>Jelszó beállítva</th>
                <th>Státusz</th>
                <th>Műveletek</th>
            </tr>
            </thead>
            <tbody id="felhasznalok-tbody"></tbody>
        </table>
    </div>
</section>
<div id="confirm-modal" class="modal" style="display:none;">
    <div class="modal-box">
        <div class="modal-title">Megerősítés</div>
        <div class="modal-szoveg" id="confirm-text"></div>

        <div class="modal-gombok">
            <button id="confirm-igen" class="admin-btn torol-piros">Törlés</button>
            <button id="confirm-nem" class="admin-btn megse-btn">Mégse</button>
        </div>
    </div>
</div>
<footer class="site-footer">
    <div class="footer-content">
        <p class="footer-title">Musztáng SE – admin felület</p>
        <p class="footer-subtitle">Fejlesztve vizsgafeladat keretében</p>

        <div class="footer-emails">
            <p>Elérhetőségek: <a href="mailto:infos@mustangse.hu" style="color: white;">infos@mustangse.hu</a></p>
        </div>

    </div>
</footer>

<script src="/Admin/Admin-Tagok.js"></script>
</body>
</html>
