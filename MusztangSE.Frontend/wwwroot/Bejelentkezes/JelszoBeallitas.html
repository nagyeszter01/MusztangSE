<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bejelentkezes/bejelentkezes.css?v=4">
    <title>Jelszó beállítás – Musztáng SE</title>
</head>
<body>

    <header>
        <div class="logo">
            <img src="/img/logo.jpg" alt="Musztáng SE">
        </div>
        <nav class="nav-center">
            <a href="/Fooldal/fooldal.html">Kezdőlap</a>
            <a href="#">Rólunk</a>
            <a href="#">Helyszínek</a>
            <a href="#">Eredmények</a>
            <a href="#">Edzőink</a>
            <a href="/Bejelentkezes/bejelentkezes.html" class="tagok">Tagoknak</a>
        </nav>
    </header>

    <div class="oldal">
        <div class="doboz">
            <h1>Jelszó beállítás</h1>
            <p class="alcim">Add meg az azonosítód és az új jelszavad</p>

            <div class="mezo-csoport">
                <label for="azonosito">Felhasználói azonosító</label>
                <input type="text" id="azonosito" placeholder="Add meg az azonosítód">
            </div>

            <div class="mezo-csoport">
                <label for="password">Jelszó</label>
                <input type="password" id="password" placeholder="Add meg az új jelszavad">
            </div>

            <div class="mezo-csoport">
                <label for="confirmPassword">Jelszó megerősítés</label>
                <input type="password" id="confirmPassword" placeholder="Írd be újra a jelszavad">
            </div>

            <button type="button" class="gomb">Megerősítés</button>

            <div id="uzenet" class="uzenet"></div>

            <div class="link-sor">
                <a href="/Bejelentkezes/bejelentkezes.html" id="jelszo-beallitas">← Vissza a bejelentkezéshez</a>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p class="footer-title">Musztáng SE</p>
        <p class="footer-subtitle">Fejlesztve vizsgafeladat keretében</p>
    </footer>

    <script src="/Bejelentkezes/bejeletkezes.js"></script>
</body>
</html>
