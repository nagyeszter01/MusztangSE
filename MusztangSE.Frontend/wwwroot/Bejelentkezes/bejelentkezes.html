<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bejelentkezes/bejelentkezes.css?v=2">
    <title>Bejelentkezés – Musztáng SE</title>
</head>
<body>

    <header>
        <div class="logo">
            <img src="/img/logo.jpg" alt="Musztáng SE">
        </div>
        <nav class="nav-center">
            <a href="/Fooldal/fooldal.html">Kezdőlap</a>
            <a href="#">Rólunk</a>
            <a href="#">Helyszínek</a>
            <a href="#">Eredmények</a>
            <a href="#">Edzőink</a>
            <a href="#" class="tagok">Tagoknak</a>
        </nav>
    </header>

    <div class="oldal">
        <div class="doboz">
            <h1>Bejelentkezés</h1>
            <p class="alcim">Üdvözlünk a Musztáng SE rendszerében</p>

            <!-- Szerepválasztó -->
            <div class="szerep-valaszto">
                <div class="szerep-opcio kivalasztva" data-szerep="edzo">Edző</div>
                <div class="szerep-opcio" data-szerep="sportolo">Sportoló</div>
            </div>

            <div class="mezo-csoport">
                <label for="azonosito">Felhasználói azonosító</label>
                <input type="text" id="azonosito" placeholder="Add meg az azonosítód">
            </div>

            <div class="mezo-csoport">
                <label for="jelszo">Jelszó</label>
                <input type="password" id="jelszo" placeholder="Add meg a jelszavad">
            </div>

            <button class="gomb" id="bejelentkezes-gomb">Bejelentkezés</button>

            <div id="uzenet" class="uzenet"></div>

            <div class="link-sor">
                <a href="/Bejelentkezes/JelszoBeallitas.html" id="jelszo-beallitas">
                    Első bejelentkezés? Állítsd be a jelszavad →
                </a>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p class="footer-title">Musztáng SE</p>
        <p class="footer-subtitle">Fejlesztve vizsgafeladat keretében</p>
    </footer>

    <script src="/Bejelentkezes/bejelentkezes.js?v=5"></script>
</body>
</html>
