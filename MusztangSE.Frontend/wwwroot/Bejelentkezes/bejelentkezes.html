<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MusztangSE/Bejelentkezes</title>
    <link rel="stylesheet" href="/Bejelentkezes/bejelentkezes.css">
</head>
<body>
    <div class="fejlec">
        <!--Logó kép formátumban -->
        <img src="/Fooldal/img/logo.jpg" alt="logo" class="logo">

        <!--Navigácios sáv-->
        <a href="/Fooldal/fooldal.html" id="kezdolap">Kezdőlap</a>
    </div>





    <div class="doboz">
        <h1>Bejelentkezés</h1>
        <p>Válaszd ki a szereped és töltsd ki az űrlapot!</p>

        <!--Kiválszthatjuk hogy edzöként vagy sportoloként lépünk be -->
        <div class="szerep-valaszto">
            <div class="szerep-opcio kivalasztva" data-szerep="edzo">Edző</div>
            <div class="szerep-opcio" data-szerep="sportolo">Sportoló</div>
        </div>

        <!--A bekért adatokat elüldi az adabásisnak-->
        <form action="" method="post" enctype="text/plain">
            <input type="hidden" id="szerep" name="szerep" value="edzo">

            <!--Input mezők itt lehet be irni a felhasználó nevet és a jelszót-->
            <label for="azonosito">Azonosító</label>
            <input id="azonosito" name="azonosito" required>

            <label for="jelszo">Jelszó</label>
            <input type="password" id="jelszo" name="jelszo" required>
            <!--Bejelentkezés gomb-->
            <button type="submit" class="gomb">Bejelentkezés</button>
            <a href="/Bejelentkezes/JelszoBeallitas.html" id="jelszo-beallitas">Jelszó beállitás</a>
        </form>

    </div>

<script src="/Bejelentkezes/bejeletkezes.js"></script>


</html>
