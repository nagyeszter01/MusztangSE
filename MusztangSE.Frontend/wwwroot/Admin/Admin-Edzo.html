<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Admin/AdminStyle.css">
    <link rel="icon" href="/img/favicon_48.png">
    <title>Admin – Edzők</title>
</head>
<body>
<header>
    <div class="logo">
        <a href="/Admin/MainPageAdmin.html">
            <img src="/img/logo.jpg" alt="Musztáng SE">
        </a>
    </div>
    <nav class="nav-center">
        <a href="/Admin/MainPageAdmin.html">Dashboard</a>
        <a href="/Admin/Admin-Tagok.html">Felhasználók</a>
        <a href="/Admin/Admin-Edzo.html" class="active">Edzők</a>
        <a href="/Admin/Admin-Csapatok.html">Csapatok</a>
        <a href="/Admin/Admin-Versenyek.html">Versenyek</a>
    </nav>
    <div class="kijelentkezes">
        <button id="kijelentkezes-gomb">Kijelentkezés</button>
    </div>
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="mobil-menu" id="mobil-menu">
        <a href="/Admin/MainPageAdmin.html">Dashboard</a>
        <a href="/Admin/Admin-Tagok.html">Felhasználók</a>
        <a href="/Admin/Admin-Edzo.html" class="active">Edzők</a>
        <a href="/Admin/Admin-Csapatok.html">Csapatok</a>
        <a href="/Admin/Admin-Versenyek.html">Versenyek</a>
        <button onclick="localStorage.clear(); window.location.href='/Bejelentkezes/bejelentkezes.html'">Kijelentkezés</button>
    </div>
</header>

<section class="content-section">
    <div class="lista-fejlec">
        <h2 class="section-title" style="margin:0">Edzők</h2>
        <div class="fejlec-gombok">
            <button id="uj-edzo-gomb" type="button" class="admin-btn">+ Új edző</button>
        </div>
    </div>

    <div id="fo-uzenet" class="uzenet"></div>

    <!-- ÚJ EDZŐ FORM -->
    <div id="uj-edzo-form" class="admin-form" style="display:none">
        <h3 class="form-title">Új edző hozzáadása</h3>
        <div class="form-grid">
            <div class="form-mezo">
                <label>Edző neve *</label>
                <input id="edzo-nev" type="text" placeholder="Teljes név">
            </div>
            <div class="form-mezo">
                <label>Felhasználói azonosító *</label>
                <div class="azonosito-wrapper">
                    <input id="edzo-azonosito" type="text" readonly class="azonosito-input" placeholder="Kattints a generálásra...">
                    <button type="button" id="edzo-azonosito-general" class="admin-btn">Generálás</button>
                </div>
            </div>
        </div>
        <div id="uj-edzo-uzenet" class="uzenet"></div>
        <div class="form-gombok">
            <button id="edzo-mentes" type="button" class="admin-btn">Mentés</button>
            <button id="edzo-megse" type="button" class="admin-btn megse-btn">Mégse</button>
        </div>
    </div>

    <!-- SZŰRŐ -->
    <div class="admin-filters">
        <input type="text" id="kereses-input" class="admin-search" placeholder="Keresés edző neve alapján...">
    </div>

    <div id="edzok-container"></div>
</section>

<!-- TÖRLÉS MODAL -->
<div id="torles-modal" class="modal" style="display:none">
    <div class="modal-box">
        <h3 class="modal-title">Edző törlése</h3>
        <p class="modal-szoveg" id="modal-szoveg"></p>
        <div id="uj-edzo-wrapper" style="display:none">
            <label class="modal-label">Csapatok átrendelése edzőhöz:</label>
            <select id="uj-edzo-select" class="admin-select" style="width:100%; margin-top:8px">
                <option value="">-- Válassz edzőt --</option>
            </select>
        </div>
        <div id="modal-uzenet" class="uzenet"></div>
        <div class="modal-gombok">
            <button id="modal-torol" type="button" class="admin-btn torol-piros">Törlés</button>
            <button id="modal-megse" type="button" class="admin-btn megse-btn">Mégse</button>
        </div>
    </div>
</div>

<footer class="site-footer">
    <div class="footer-content">
        <p class="footer-title">Musztáng SE – admin felület</p>
        <p class="footer-subtitle">Fejlesztve vizsgafeladat keretében</p>

        <div class="footer-emails">
            <p>Elérhetőségek: <a href="mailto:infos@mustangse.hu" style="color: white;">info@mustangse.hu</a></p>
        </div>

    </div>
</footer>

<script src="/Admin/Admin-Edzo.js"></script>
</body>
</html>
