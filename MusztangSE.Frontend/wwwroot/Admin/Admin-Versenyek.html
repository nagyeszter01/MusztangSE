<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Admin/AdminStyle.css">
    <title>Admin – Versenyek</title>
</head>
<body>
<header>
    <div class="logo">
        <a href="/Admin/MainPageAdmin.html">
            <img src="/img/logo.jpg" alt="Musztáng SE">
        </a>
    </div>
    <nav class="nav-center">
        <a href="/Admin/MainPageAdmin.html">Dashboard</a>
        <a href="/Admin/Admin-Tagok.html">Felhasználók</a>
        <a href="/Admin/Admin-Edzo.html">Edzők</a>
        <a href="/Admin/Admin-Csapatok.html">Csapatok</a>
        <a href="/Admin/Admin-Versenyek.html" class="active">Versenyek</a>
    </nav>
    <div class="kijelentkezes">
        <button id="kijelentkezes-gomb">Kijelentkezés</button>
    </div>
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="mobil-menu" id="mobil-menu">
        <a href="/Admin/MainPageAdmin.html">Dashboard</a>
        <a href="/Admin/Admin-Tagok.html">Felhasználók</a>
        <a href="/Admin/Admin-Edzo.html">Edzők</a>
        <a href="/Admin/Admin-Csapatok.html">Csapatok</a>
        <a href="/Admin/Admin-Versenyek.html">Versenyek</a>
        <button onclick="localStorage.clear(); window.location.href='/Bejelentkezes/bejelentkezes.html'">Kijelentkezés</button>
    </div>
</header>

<section class="content-section">
    <div class="lista-fejlec">
        <h2 class="section-title" style="margin:0">Versenyek</h2>
        <div class="fejlec-gombok">
            <button id="uj-verseny-gomb" type="button" class="admin-btn">+ Új verseny</button>
        </div>
    </div>

    <div id="fo-uzenet" class="uzenet"></div>

    <!-- ÚJ VERSENY FORM -->
    <div id="uj-verseny-form" class="admin-form" style="display:none">
        <h3 class="form-title">Új verseny hozzáadása</h3>
        <div class="form-grid">
            <div class="form-mezo">
                <label>Verseny neve *</label>
                <input id="uj-nev" type="text" placeholder="Verseny neve">
            </div>
            <div class="form-mezo">
                <label>Helyszín *</label>
                <input id="uj-hely" type="text" placeholder="Helyszín">
            </div>
            <div class="form-mezo">
                <label>Dátum *</label>
                <input id="uj-datum" type="date">
            </div>
        </div>
        <div id="uj-verseny-uzenet" class="uzenet"></div>
        <div class="form-gombok">
            <button id="uj-verseny-mentes" type="button" class="admin-btn">Mentés</button>
            <button id="uj-verseny-megse" type="button" class="admin-btn megse-btn">Mégse</button>
        </div>
    </div>

    <!-- SZŰRŐ -->
    <div class="admin-filters">
        <input type="text" id="kereses-input" class="admin-search" placeholder="Keresés verseny neve vagy helyszín alapján...">
        <select id="ido-filter" class="admin-select">
            <option value="osszes">Összes verseny</option>
            <option value="kozelgo">Közelgő versenyek</option>
            <option value="elmult">Elmúlt versenyek</option>
        </select>
    </div>

    <!-- VERSENYEK TÁBLÁZAT -->
    <div class="admin-table-wrapper">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Verseny neve</th>
                <th>Dátum</th>
                <th>Helyszín</th>
                <th>Műveletek</th>
            </tr>
            </thead>
            <tbody id="versenyek-tbody"></tbody>
        </table>
    </div>
</section>

<!-- SZERKESZTÉS MODAL -->
<div id="edit-modal" class="modal" style="display:none">
    <div class="modal-box">
        <h3 class="modal-title">Verseny szerkesztése</h3>
        <input type="hidden" id="edit-id">
        <div class="form-mezo" style="margin-bottom:14px">
            <label>Verseny neve *</label>
            <input id="edit-nev" type="text" placeholder="Verseny neve"
                   style="width:100%; padding:12px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:white; font-family:'IBM Plex Serif',serif; font-size:0.95rem; box-sizing:border-box">
        </div>
        <div class="form-mezo" style="margin-bottom:14px">
            <label>Helyszín *</label>
            <input id="edit-hely" type="text" placeholder="Helyszín"
                   style="width:100%; padding:12px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:white; font-family:'IBM Plex Serif',serif; font-size:0.95rem; box-sizing:border-box">
        </div>
        <div class="form-mezo" style="margin-bottom:14px">
            <label>Dátum *</label>
            <input id="edit-datum" type="date"
                   style="width:100%; padding:12px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:white; font-family:'IBM Plex Serif',serif; font-size:0.95rem; box-sizing:border-box">
        </div>
        <div id="edit-uzenet" class="uzenet"></div>
        <div class="modal-gombok">
            <button id="edit-mentes" type="button" class="admin-btn">Mentés</button>
            <button id="edit-megse" type="button" class="admin-btn megse-btn">Mégse</button>
        </div>
    </div>
</div>

<footer class="site-footer">
    <div class="footer-content">
        <p class="footer-title">Musztáng SE – admin felület</p>
        <p class="footer-subtitle">Fejlesztve vizsgafeladat keretében</p>
    </div>
</footer>

<script src="/Admin/Admin-Versenyek.js"></script>
</body>
</html>
