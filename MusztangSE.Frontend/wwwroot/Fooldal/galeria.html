    <style>
        .galeria-section {
            position: relative;
            min-height: 100vh;
            padding: 120px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ddd;
            background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
        }

        .galeria-title {
            font-family: 'Goldman', sans-serif;
            font-size: 60px;
            margin-bottom: 60px;
            text-align: center;
        }

        .galeria-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1400px;
        }

        .galeria-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

            .galeria-item img {
                width: 100%;
                height: 300px;
                object-fit: cover;
                display: block;
                transition: transform 0.3s;
            }

            .galeria-item:hover {
                transform: translateY(-10px);
                box-shadow: 0 12px 25px rgba(0,0,0,0.6);
            }

                .galeria-item:hover img {
                    transform: scale(1.05);
                }

        .back-btn {
            margin-top: 50px;
            background: red;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            font-size: 18px;
            font-family: 'IBM Plex Serif', serif;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

            .back-btn:hover {
                background: #ff3b3b;
                transform: scale(1.05);
            }

        /* ── LIGHTBOX ── */
        .lightbox-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

            .lightbox-overlay.active {
                display: flex;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            object-fit: contain;
            animation: zoomIn 0.25s ease;
            user-select: none;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            font-size: 44px;
            color: #fff;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s, transform 0.2s;
            z-index: 10000;
            user-select: none;
        }

            .lightbox-close:hover {
                color: red;
                transform: scale(1.15);
            }

        .lightbox-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 52px;
            color: #fff;
            cursor: pointer;
            padding: 10px 18px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            transition: background 0.2s, transform 0.2s;
            z-index: 10000;
            user-select: none;
            line-height: 1;
        }

            .lightbox-arrow:hover {
                background: rgba(255, 0, 0, 0.5);
                transform: translateY(-50%) scale(1.1);
            }

        .lightbox-prev {
            left: 16px;
        }

        .lightbox-next {
            right: 16px;
        }

        .lightbox-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 15px;
            font-family: 'IBM Plex Serif', serif;
            letter-spacing: 1px;
        }

        /* Reszponzív */
        @media (max-width: 1200px) {
            .galeria-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .galeria-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .galeria-item img {
                height: 250px;
            }
        }

        @media (max-width: 480px) {
            .galeria-container {
                grid-template-columns: 1fr;
            }

            .galeria-item img {
                height: 200px;
            }

            .galeria-title {
                font-size: 40px;
            }

            .back-btn {
                font-size: 16px;
                padding: 10px 20px;
            }

            .lightbox-arrow {
                font-size: 36px;
                padding: 8px 13px;
            }
        }
    </style>
</head>

    <!-- LIGHTBOX -->
    <div class="lightbox-overlay" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <span class="lightbox-arrow lightbox-prev" id="lightboxPrev">&#8249;</span>
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
        <span class="lightbox-arrow lightbox-next" id="lightboxNext">&#8250;</span>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <script>
        const images   = Array.from(document.querySelectorAll('.galeria-item img'));
        const overlay  = document.getElementById('lightbox');
        const lbImg    = document.getElementById('lightboxImg');
        const lbClose  = document.getElementById('lightboxClose');
        const lbPrev   = document.getElementById('lightboxPrev');
        const lbNext   = document.getElementById('lightboxNext');
        const lbCount  = document.getElementById('lightboxCounter');
        let current    = 0;

        function openLightbox(index) {
            current = index;
            lbImg.src = images[current].src;
            lbImg.alt = images[current].alt;
            lbCount.textContent = (current + 1) + ' / ' + images.length;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function showPrev() {
            current = (current - 1 + images.length) % images.length;
            lbImg.style.animation = 'none';
            lbImg.offsetHeight; // reflow
            lbImg.style.animation = '';
            lbImg.src = images[current].src;
            lbCount.textContent = (current + 1) + ' / ' + images.length;
        }

        function showNext() {
            current = (current + 1) % images.length;
            lbImg.style.animation = 'none';
            lbImg.offsetHeight; // reflow
            lbImg.style.animation = '';
            lbImg.src = images[current].src;
            lbCount.textContent = (current + 1) + ' / ' + images.length;
        }

        // Kép kattintás
        images.forEach((img, i) => {
            img.parentElement.addEventListener('click', () => openLightbox(i));
        });

        // Gombok
        lbClose.addEventListener('click', closeLightbox);
        lbPrev.addEventListener('click', showPrev);
        lbNext.addEventListener('click', showNext);

        // Háttérre kattintva zárja be
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeLightbox();
        });

        // Billentyűzet: nyilak + ESC
        document.addEventListener('keydown', (e) => {
            if (!overlay.classList.contains('active')) return;
            if (e.key === 'ArrowLeft')  showPrev();
            if (e.key === 'ArrowRight') showNext();
            if (e.key === 'Escape')     closeLightbox();
        });
    </script>
